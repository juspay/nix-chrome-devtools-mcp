name: nix-chrome-devtools-mcp
version: 0.1.0
description: chrome-devtools-mcp launcher — a single bash launcher that resolves Playwright's bundled Chrome-for-Testing and Node.js directly through Nix. No devshell required.
type: hybrid

# Canonical MCP server entry for this package. APM aggregates this into
# the consumer's runtime configs via MCPIntegrator.collect_transitive
# (apm-cli src/apm_cli/integration/mcp_integrator.py:65) — depth-1 direct
# deps auto-trust self-defined servers.
dependencies:
  mcp:
    - name: chrome-devtools
      registry: false
      transport: stdio
      # `.agents/skills/<name>/` is APM's converged cross-tool skill deploy
      # path. The launcher is shipped as a skill primitive so the file is
      # deployed to (and tracked in) the consumer's working tree, which keeps
      # the MCP server bootable even before `apm install` runs on a fresh
      # clone (apm_modules/ is conventionally git-ignored).
      # https://microsoft.github.io/apm/reference/targets-matrix/#skills-convergence
      command: .agents/skills/nix-chrome-devtools-mcp/bin/serve
